server {
    listen 80;
    server_name 57.128.246.255;  # Remplace par ton domaine si tu en as un

    # Proxy vers le backend Go (port 8000)
    location /api {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Sert le frontend Angular (fichiers statiques)
    location / {
        root  /var/www/wow-ah-bot;
        index index.html;
        try_files $uri $uri/ /index.html;  # nécessaire pour le routing Angular
    }
}
